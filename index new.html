<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prometheia — Analysis Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #04040f;
    --bg1:     #08091a;
    --bg2:     #0c0d1e;
    --bg3:     #101124;
    --border:  #141528;
    --border2: #1e1f38;
    --text:    #f0f0f8;
    --muted:   #8888aa;
    --dim:     #4a4a66;
    --cyan:    #06b6d4;
    --cyan-dim:#0e6b7e;
    --green:   #10b981;
    --amber:   #f59e0b;
    --red:     #ef4444;
    --violet:  #8b5cf6;
    --font:    'Space Grotesk', system-ui, sans-serif;
    --mono:    'JetBrains Mono', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(6,182,212,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 30% at 80% 80%, rgba(139,92,246,0.04) 0%, transparent 60%);
    background-attachment: fixed;
  }

  ::selection { background: rgba(6,182,212,0.25); color: var(--text); }

  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  * { transition: background-color 0.15s, border-color 0.15s, color 0.15s; }
  button, a { font-family: var(--font); }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .animate-in { animation: fadeIn 0.3s ease both; }

  @keyframes holoOpen {
    0%   { clip-path: inset(50% 50% 50% 50% round 2px); opacity:0; filter:brightness(3); }
    30%  { opacity:1; filter:brightness(1.4); }
    100% { clip-path: inset(0% 0% 0% 0% round 2px); filter:brightness(1); }
  }
  @keyframes holoFlicker {
    0%,100% { opacity:1; }
    4%   { opacity:0.88; }
    5%   { opacity:1; }
    55%  { opacity:0.94; }
    56%  { opacity:1; }
    80%  { opacity:0.97; }
  }
  @keyframes crtScan {
    0%   { transform: translateY(-100%); }
    100% { transform: translateY(200%); }
  }
  @keyframes beamPulse {
    0%,100% { opacity:0.7; }
    50% { opacity:1; }
  }
  .holo-card {
    animation: holoOpen 0.5s cubic-bezier(0.16,1,0.3,1) both,
               holoFlicker 4s 0.5s infinite;
    position: absolute;
    transform-origin: center bottom;
  }
  .holo-scan-sweep {
    position:absolute; left:0; right:0; height:40%;
    background: linear-gradient(180deg, transparent 0%, rgba(0,255,200,0.04) 50%, transparent 100%);
    animation: crtScan 3s linear infinite;
    pointer-events:none; z-index:20;
  }


  .glass {
    background: rgba(6,8,28,0.5) !important;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.07) !important;
  }
  .glass-light {
    background: rgba(12,14,40,0.4) !important;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.05) !important;
  }

  #particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  #root { position: relative; z-index: 1; }
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div id="holo-overlay" style="position:fixed;inset:0;z-index:50;pointer-events:none;"></div>
<div id="root"></div>

<script>
(function() {

// ── DATA ──────────────────────────────────────────────────────────
const STOCKS = [
  { ticker:'NVDA', name:'NVIDIA Corp', change:'+4.2%', color:'#10b981' },
  { ticker:'ALPHA', name:'Alpha Bank', change:'+1.8%', color:'#10b981' },
  { ticker:'LMT', name:'Lockheed Martin', change:'+0.4%', color:'#10b981' },
  { ticker:'TSLA', name:'Tesla Inc', change:'-2.1%', color:'#ef4444' },
  { ticker:'WYNN', name:'Wynn Resorts', change:'-1.2%', color:'#ef4444' },
  { ticker:'EUROB', name:'Eurobank', change:'+2.1%', color:'#10b981' },
  { ticker:'AAPL', name:'Apple Inc', change:'+0.8%', color:'#10b981' },
  { ticker:'MGM', name:'MGM Resorts', change:'-0.6%', color:'#ef4444' },
];
const EVENTS = [
  { tag:'GEOPOLITICAL', title:'Iran nuclear talks collapse', body:'US imposes sweeping new oil sanctions after IAEA inspection framework rejected.' },
  { tag:'MACRO', title:'US–China tariffs hit 145%', body:'New duties on semiconductor equipment rattle Asian supply chains.' },
  { tag:'DEFENSE', title:'NATO spending surge', body:'Eastern European members commit record €340B over 5 years.' },
  { tag:'MARKETS', title:'ECB holds rates steady', body:'Decision fuels Greek banking sector outperformance vs EU peers.' },
  { tag:'SECTOR', title:'Macau VIP revenue falls', body:'Cross-border capital flow restrictions bite casino operators for third quarter.' },
  { tag:'ENERGY', title:'Saudi Aramco cuts output', body:'OPEC+ coalition trims production by 1.2M barrels per day.' },
  { tag:'CRYPTO', title:'Bitcoin crosses $95k', body:'Institutional ETF inflows accelerate as halving cycle matures.' },
  { tag:'TECH', title:'EU AI Act enforcement begins', body:'Major model providers face compliance deadlines across bloc.' },
];

function randSparkline(up, len=28) {
  const pts = [50];
  for (let i=1;i<len;i++) {
    const drift = up ? 0.3 : -0.3;
    pts.push(Math.max(5,Math.min(95, pts[i-1] + drift + (Math.random()-0.5)*8)));
  }
  return pts;
}

function sparklinePath(pts, w, h) {
  const xStep = w/(pts.length-1);
  return pts.map((p,i) => `${i===0?'M':'L'}${(i*xStep).toFixed(1)},${(h - p/100*h).toFixed(1)}`).join(' ');
}

// ── CANVAS ────────────────────────────────────────────────────────
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('holo-overlay');
let W, H;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); placeNodes(); });

// ── NODES ─────────────────────────────────────────────────────────
const NODE_COUNT = 52;
const MAX_DIST = 200;
const HOVER_R = 22;
let nodes = [];

function placeNodes() {
  // Scatter with slight clustering
  nodes = Array.from({ length: NODE_COUNT }, (_, i) => {
    const isStock = Math.random() > 0.45;
    const data = isStock
      ? { ...STOCKS[i % STOCKS.length], sparkline: randSparkline(STOCKS[i%STOCKS.length].change.startsWith('+')) }
      : EVENTS[i % EVENTS.length];
    return {
      x: 40 + Math.random() * (W - 80),
      y: 40 + Math.random() * (H - 80),
      r: 2.5 + Math.random() * 5,
      phase: Math.random() * Math.PI * 2,
      hoverT: 0,
      isStock,
      data,
    };
  });
}
placeNodes();

// ── HOVER ─────────────────────────────────────────────────────────
let mouse = { x:-9999, y:-9999 };
let hoveredNode = null;
let holoTimer = null;
let holoNode = null;   // node currently showing holo
let holoPos = { x:0, y:0 };

// Use window-level tracking so events fire even when #root is on top
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX; mouse.y = e.clientY;
  let found = null;
  for (const n of nodes) {
    if (Math.hypot(n.x - e.clientX, n.y - e.clientY) < HOVER_R) { found = n; break; }
  }

  if (found !== hoveredNode) {
    // leaving old node
    clearTimeout(holoTimer); holoTimer = null;
    if (hoveredNode) { hoveredNode.hoverT = 0; }
    // entering new node
    hoveredNode = found;
    if (!found) { hideHolo(); return; }
    holoPos = { x: e.clientX, y: e.clientY };
    holoTimer = setTimeout(() => {
      if (hoveredNode === found) showHolo(found, holoPos.x, holoPos.y);
    }, 500);
  } else if (found) {
    holoPos = { x: e.clientX, y: e.clientY };
  }
});
window.addEventListener('mouseleave', () => {
  mouse.x = -9999; mouse.y = -9999;
  clearTimeout(holoTimer); holoTimer = null;
  if (hoveredNode) hoveredNode.hoverT = 0;
  hoveredNode = null;
  hideHolo();
});

function showHolo(node, mx, my) {
  const W2 = window.innerWidth;
  const holoW = 240, holoH = 160;
  const beamH = 60;
  // Center above the dot
  let left = node.x - holoW / 2;
  let top  = node.y - node.r - beamH - holoH;
  // Clamp to viewport
  if (left < 8) left = 8;
  if (left + holoW > W2 - 8) left = W2 - holoW - 8;
  if (top < 8) top = 8;

  // Store where holo is so canvas can draw beam
  node.holoLeft = left;
  node.holoTop  = top;
  node.holoW    = holoW;
  node.holoH    = holoH;

  overlay.innerHTML = buildHolo(node);
  const el = overlay.firstChild;
  el.style.left = left + 'px';
  el.style.top  = top  + 'px';
  holoNode = node;
}

function hideHolo() {
  const el = overlay.firstChild;
  if (!el) return;
  el.style.animation = 'none';
  el.style.opacity = '0';
  el.style.transform = 'scaleY(0)';
  el.style.transition = 'opacity 0.15s, transform 0.15s';
  setTimeout(() => { overlay.innerHTML = ''; holoNode = null; }, 160);
}

function buildHolo(node) {
  if (node.isStock) return buildStockHolo(node.data);
  return buildEventHolo(node.data);
}

function crtFrame(content, color, width=240) {
  const c = color;
  return `<div class="holo-card" style="
    position:absolute; width:${width}px;
    background: linear-gradient(160deg, rgba(0,8,12,0.97) 0%, rgba(0,4,10,0.99) 100%);
    backdrop-filter: blur(4px);
    border: 1px solid ${c}99;
    border-radius: 3px;
    box-shadow:
      0 0 0 1px ${c}22,
      0 0 20px ${c}44,
      0 0 60px ${c}18,
      inset 0 0 30px ${c}08;
    overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
  ">
    <div class="holo-scan-sweep"></div>
    <!-- CRT scanlines -->
    <div style="position:absolute;inset:0;background:repeating-linear-gradient(
      180deg,
      rgba(0,0,0,0.18) 0px, rgba(0,0,0,0.18) 1px,
      transparent 1px, transparent 3px
    );pointer-events:none;z-index:15;"></div>
    <!-- Corner brackets -->
    <div style="position:absolute;top:4px;left:4px;width:10px;height:10px;border-top:1.5px solid ${c};border-left:1.5px solid ${c};"></div>
    <div style="position:absolute;top:4px;right:4px;width:10px;height:10px;border-top:1.5px solid ${c};border-right:1.5px solid ${c};"></div>
    <div style="position:absolute;bottom:4px;left:4px;width:10px;height:10px;border-bottom:1.5px solid ${c};border-left:1.5px solid ${c};"></div>
    <div style="position:absolute;bottom:4px;right:4px;width:10px;height:10px;border-bottom:1.5px solid ${c};border-right:1.5px solid ${c};"></div>
    ${content}
  </div>`;
}

function buildStockHolo(d) {
  const isUp = d.change.startsWith('+');
  const clr = isUp ? '#00ff9f' : '#ff4466';
  const pts = d.sparkline;
  const path = sparklinePath(pts, 196, 54);
  const fillPath = path + ` L196,54 L0,54 Z`;
  const lastY = (54 - pts[pts.length-1]/100*54).toFixed(1);

  const content = `
    <div style="padding:14px 14px 6px; position:relative; z-index:5;">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2px;">
        <span style="color:#00ffee;font-size:17px;font-weight:700;letter-spacing:0.1em;
          text-shadow: 0 0 8px #00ffee, 0 0 20px #00ffee88;">${d.ticker}</span>
        <span style="font-size:13px;font-weight:700;color:${clr};
          text-shadow: 0 0 8px ${clr}88;">${d.change}</span>
      </div>
      <div style="color:#006655;font-size:10px;letter-spacing:0.12em;margin-bottom:10px;">${d.name.toUpperCase()}</div>
      <svg width="196" height="54" viewBox="0 0 196 54" style="display:block;overflow:visible;">
        <defs>
          <linearGradient id="g${d.ticker}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${clr}" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="${clr}" stop-opacity="0"/>
          </linearGradient>
          <filter id="bloom${d.ticker}">
            <feGaussianBlur stdDeviation="1.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <path d="${fillPath}" fill="url(#g${d.ticker})"/>
        <path d="${path}" fill="none" stroke="${clr}" stroke-width="1.5"
          stroke-linecap="round" filter="url(#bloom${d.ticker})"/>
        <circle cx="196" cy="${lastY}" r="3.5" fill="${clr}"
          style="filter:drop-shadow(0 0 4px ${clr})"/>
      </svg>
    </div>
    <div style="padding:4px 14px 12px;display:flex;align-items:center;gap:6px;position:relative;z-index:5;">
      <div style="width:5px;height:5px;border-radius:50%;background:#00ffee;
        box-shadow:0 0 8px #00ffee;animation:pulse 1.5s infinite;"></div>
      <span style="color:#004433;font-size:8px;letter-spacing:0.18em;">PROMETHEIA · LIVE FEED</span>
    </div>
  `;
  return crtFrame(content, '#00ddbb');
}

function buildEventHolo(d) {
  const tagColors = {
    GEOPOLITICAL:'#ffaa00', MACRO:'#ff4444', DEFENSE:'#cc88ff',
    MARKETS:'#00ff9f', SECTOR:'#00eeff', ENERGY:'#ffaa00',
    CRYPTO:'#cc88ff', TECH:'#00eeff',
  };
  const clr = tagColors[d.tag] || '#00eeff';

  const content = `
    <div style="padding:14px 14px 12px;position:relative;z-index:5;">
      <div style="color:${clr};font-size:9px;font-weight:700;letter-spacing:0.22em;
        text-shadow:0 0 8px ${clr}88;margin-bottom:8px;">${d.tag}</div>
      <div style="color:#e8ffe8;font-size:12px;font-weight:600;line-height:1.4;
        text-shadow:0 0 6px rgba(0,255,200,0.3);margin-bottom:8px;">${d.title}</div>
      <div style="color:#447766;font-size:10px;line-height:1.65;">${d.body}</div>
      <div style="margin-top:10px;border-top:1px solid ${clr}33;padding-top:8px;
        display:flex;align-items:center;gap:6px;">
        <div style="width:5px;height:5px;border-radius:50%;background:${clr};
          box-shadow:0 0 8px ${clr};animation:pulse 2s infinite;"></div>
        <span style="color:#224433;font-size:8px;letter-spacing:0.16em;">INTELLIGENCE · PROMETHEIA</span>
      </div>
    </div>
  `;
  return crtFrame(content, clr);
}

// ── DRAW LOOP ─────────────────────────────────────────────────────
const t0 = Date.now();
function draw() {
  ctx.clearRect(0, 0, W, H);
  const t = (Date.now() - t0) / 1000;

  // Pre-compute connected set for hovered node
  const connectedSet = new Set();
  if (hoveredNode) {
    for (const n of nodes) {
      if (n !== hoveredNode && Math.hypot(n.x-hoveredNode.x, n.y-hoveredNode.y) < MAX_DIST) {
        connectedSet.add(n);
      }
    }
  }

  // Connections
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      const dist = Math.hypot(a.x-b.x, a.y-b.y);
      if (dist < MAX_DIST) {
        const base = (1 - dist/MAX_DIST) * 0.15;
        const isDirectHov = hoveredNode === a || hoveredNode === b;
        const isNeighbour = connectedSet.has(a) && connectedSet.has(b);
        const h = hoveredNode ? hoveredNode.hoverT : 0;

        let alpha, lineW, color;
        if (isDirectHov) {
          alpha = base * 5 * h + base * (1-h);
          lineW = 1 + h * 0.5;
          color = `rgba(0,240,200,${Math.min(0.85,alpha)})`;
        } else if (isNeighbour) {
          alpha = base + base * 1.5 * h;
          lineW = 0.5;
          color = `rgba(0,200,180,${Math.min(0.35,alpha)})`;
        } else {
          alpha = base * (hoveredNode ? Math.max(0.3, 1 - h*0.6) : 1);
          lineW = 0.3;
          color = `rgba(60,80,180,${alpha})`;
        }
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = color;
        ctx.lineWidth = lineW;
        ctx.stroke();
      }
    }
  }

  // UFO beam — draw BEFORE nodes so nodes render on top
  if (hoveredNode && hoveredNode.hoverT > 0.1 && hoveredNode.holoTop != null) {
    const n = hoveredNode;
    const h = n.hoverT;
    const beamBottom = n.y - n.r;
    const beamTop    = n.holoTop + (n.holoH || 160);
    const holoMidX   = n.holoLeft + (n.holoW || 240) / 2;
    const spreadTop  = (n.holoW || 240) * 0.45;
    const spreadBot  = n.r * 0.8;

    // Beam body
    const beamGrad = ctx.createLinearGradient(n.x, beamBottom, n.x, beamTop);
    beamGrad.addColorStop(0, `rgba(0,255,200,${0.25 * h})`);
    beamGrad.addColorStop(0.4, `rgba(0,255,200,${0.1 * h})`);
    beamGrad.addColorStop(1, `rgba(0,255,200,0)`);
    ctx.beginPath();
    ctx.moveTo(n.x - spreadBot, beamBottom);
    ctx.lineTo(holoMidX - spreadTop, beamTop);
    ctx.lineTo(holoMidX + spreadTop, beamTop);
    ctx.lineTo(n.x + spreadBot, beamBottom);
    ctx.closePath();
    ctx.fillStyle = beamGrad;
    ctx.fill();

    // Beam center bright line
    ctx.beginPath();
    ctx.moveTo(n.x, beamBottom);
    ctx.lineTo(holoMidX, beamTop);
    ctx.strokeStyle = `rgba(0,255,220,${0.35 * h})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // Nodes
  for (const n of nodes) {
    const isHov = hoveredNode === n;
    // Smooth hoverT 0→1
    if (isHov && n.hoverT < 1) n.hoverT = Math.min(1, n.hoverT + 0.06);
    else if (!isHov && n.hoverT > 0) n.hoverT = Math.max(0, n.hoverT - 0.04);
    const h = n.hoverT;
    const isNeighbour = connectedSet.has(n);
    const neighbourBoost = isNeighbour ? (hoveredNode?.hoverT || 0) * 0.35 : 0;

    const breath = 0.6 + 0.4 * Math.sin(t * 1.2 + n.phase);
    const alpha = h > 0 ? 0.5 + 0.5*h : Math.min(0.95, (n.r > 5 ? 0.75*breath : 0.45*breath) + neighbourBoost);
    const r = n.r * (1 + h * 0.7);  // enlarge up to 1.7x on hover
    const baseColor = n.isStock
      ? (n.data.change?.startsWith('+') ? '16,185,129' : '239,68,68')
      : '6,182,212';
    const cyanColor = '6,182,212';

    // Outer glow halo — intensifies on hover
    const haloR = r + 4 + h * 16;
    const haloAlpha = h > 0 ? (0.08 + h*0.32)*breath : (n.r > 4 ? 0.1*breath : 0);
    if (haloAlpha > 0.01) {
      const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, haloR);
      grad.addColorStop(0, `rgba(${h>0.3 ? cyanColor : baseColor},${haloAlpha})`);
      grad.addColorStop(1, `rgba(${h>0.3 ? cyanColor : baseColor},0)`);
      ctx.beginPath();
      ctx.arc(n.x, n.y, haloR, 0, Math.PI*2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Outer ring — appears on hover
    if (n.r > 4 || h > 0.1) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 3.5, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(${h>0.3?cyanColor:baseColor},${h > 0.1 ? 0.3+h*0.4 : 0.2*breath})`;
      ctx.lineWidth = h > 0.1 ? 1 + h : 0.6;
      ctx.stroke();
    }

    // Core dot
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${h>0.5?cyanColor:baseColor},${alpha})`;
    ctx.fill();

    // Crosshair ticks — fade in on hover
    if (h > 0.05) {
      ctx.strokeStyle = `rgba(6,182,212,${h * 0.8})`;
      ctx.lineWidth = 0.8;
      const tick = r + 5 + h*6;
      const gap = r + 2;
      [[- tick, 0, -gap, 0],[gap, 0, tick, 0],[0,-tick,0,-gap],[0,gap,0,tick]].forEach(([x1,y1,x2,y2]) => {
        ctx.beginPath(); ctx.moveTo(n.x+x1,n.y+y1); ctx.lineTo(n.x+x2,n.y+y2); ctx.stroke();
      });
    }
  }

  requestAnimationFrame(draw);
}
draw();
})();
</script>

};

function DashCard({ dash }) {
  const [hover, setHover] = useState(false);
  const cfg = typeConfig[dash.type];

  return (
    <a href={dash.path}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        background: hover ? 'rgba(14,16,44,0.75)' : 'rgba(6,8,28,0.5)',
        border: `1px solid ${hover ? cfg.color + '55' : 'rgba(255,255,255,0.06)'}`,
        backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)',
        borderRadius: 10, padding: '18px 20px',
        textDecoration: 'none', display: 'flex', flexDirection: 'column', gap: 10,
        position: 'relative', overflow: 'hidden',
      }}
      onClick={e => e.preventDefault()}
    >
      {hover && (
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0, height: 2,
          background: `linear-gradient(90deg, transparent, ${cfg.color}, transparent)`,
        }} />
      )}
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <Icon d={cfg.icon} size={13} color={cfg.color} />
        <span style={{ color: cfg.color, fontSize: 10, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase' }}>
          {cfg.label}
        </span>
      </div>
      <h3 style={{ color: C.text, fontSize: 14, fontWeight: 600, lineHeight: 1.4, margin: 0 }}>
        {dash.title}
      </h3>
      <div style={{ display: 'flex', alignItems: 'center', gap: 5, color: C.dim, fontSize: 11, marginTop: 'auto' }}>
        <Icon d={Icons.Clock} size={11} color={C.dim} />
        <span style={{ fontFamily: 'var(--mono)' }}>{dash.date}</span>
      </div>
    </a>
  );
}

// ─── SECTION HEADER ──────────────────────────────────────────────
function SectionHeader({ icon, label, count }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 16 }}>
      <Icon d={Icons[icon]} size={14} color={C.muted} />
      <span style={{ color: C.muted, fontSize: 11, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase' }}>{label}</span>
      {count != null && (
        <span style={{ color: C.dim, fontSize: 10, fontFamily: 'var(--mono)', marginLeft: 2 }}>({count})</span>
      )}
      <div style={{ flex: 1, height: 1, background: C.border, marginLeft: 4 }} />
    </div>
  );
}

// ─── TWEAKS ──────────────────────────────────────────────────────
function TweaksPanel({ visible }) {
  const accents = [
    { label: 'Cyan',   val: '#06b6d4' },
    { label: 'Violet', val: '#8b5cf6' },
    { label: 'Green',  val: '#10b981' },
    { label: 'Amber',  val: '#f59e0b' },
  ];
  const [active, setActive] = useState('#06b6d4');

  if (!visible) return null;
  return (
    <div className="animate-in" style={{
      position: 'fixed', bottom: 20, right: 20, zIndex: 300,
      background: C.bg2, border: `1px solid ${C.border2}`,
      borderRadius: 10, padding: '18px 20px', width: 220,
      boxShadow: '0 20px 60px rgba(0,0,0,0.6)',
    }}>
      <div style={{ color: C.muted, fontSize: 10, fontWeight: 600, letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: 14 }}>Tweaks</div>
      <div style={{ marginBottom: 12 }}>
        <div style={{ color: C.dim, fontSize: 10, marginBottom: 8, letterSpacing: '0.05em', textTransform: 'uppercase' }}>Accent</div>
        <div style={{ display: 'flex', gap: 6 }}>
          {accents.map(a => (
            <div key={a.val} onClick={() => setActive(a.val)} style={{
              width: 24, height: 24, borderRadius: 5, background: a.val, cursor: 'pointer',
              outline: active === a.val ? `2px solid ${C.text}` : '2px solid transparent',
              outlineOffset: 2,
            }} />
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── NEWS SECTION ───────────────────────────────────────────────
const NEWS = [
  {
    id: 1, category: 'Geopolitical', categoryColor: C.amber,
    headline: 'Iran nuclear talks collapse as US imposes new oil sanctions',
    summary: 'Diplomatic channels closed after Tehran rejected the latest IAEA inspection framework, escalating tensions across the Persian Gulf.',
    source: 'Reuters Intelligence', time: '2h ago', hot: true,
  },
  {
    id: 2, category: 'Markets', categoryColor: C.green,
    headline: 'Greek banks outperform EU peers on rising NIM expectations',
    summary: 'Alpha Bank and Eurobank post strongest quarterly results since 2008, driven by ECB rate environment and improved asset quality.',
    source: 'Financial Times', time: '4h ago', hot: false,
  },
  {
    id: 3, category: 'Defense', categoryColor: C.violet,
    headline: 'NATO defense budget commitments fuel LMT backlog surge',
    summary: 'Lockheed Martin confirms $18B in new F-35 orders tied to expanded NATO spending pledges from Eastern European members.',
    source: 'Defense News', time: '6h ago', hot: false,
  },
  {
    id: 4, category: 'Sector', categoryColor: C.cyan,
    headline: 'Macau gaming revenue misses estimates for third straight quarter',
    summary: 'VIP segment continues to contract as Chinese regulators tighten cross-border capital flows, pressuring Wynn and MGM Asia operations.',
    source: 'Bloomberg', time: '8h ago', hot: true,
  },
  {
    id: 5, category: 'Macro', categoryColor: C.red,
    headline: 'US-China tariff escalation hits 145% on key tech imports',
    summary: 'White House confirms sweeping duties on semiconductor equipment and AI hardware components, rattling supply chains across Asia.',
    source: 'WSJ', time: '11h ago', hot: false,
  },
];

function NewsCard({ item, featured }) {
  const [hover, setHover] = useState(false);
  return (
    <div
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        background: hover ? 'rgba(14,16,44,0.75)' : 'rgba(6,8,28,0.5)',
        border: `1px solid ${hover ? item.categoryColor + '44' : 'rgba(255,255,255,0.06)'}`,
        backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)',
        borderRadius: 10,
        padding: featured ? '20px 22px' : '14px 16px',
        cursor: 'pointer',
        position: 'relative',
        overflow: 'hidden',
      }}
    >
      {hover && (
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0, height: 1,
          background: `linear-gradient(90deg, transparent, ${item.categoryColor}88, transparent)`,
        }} />
      )}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: featured ? 10 : 7 }}>
        <span style={{
          fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase',
          color: item.categoryColor, fontFamily: 'var(--mono)',
        }}>{item.category}</span>
        {item.hot && (
          <span style={{
            fontSize: 9, fontWeight: 700, letterSpacing: '0.08em',
            color: C.red, display: 'flex', alignItems: 'center', gap: 3,
          }}>
            <Icon d={Icons.Flame} size={9} color={C.red} /> HOT
          </span>
        )}
        <span style={{ marginLeft: 'auto', color: C.dim, fontSize: 10, fontFamily: 'var(--mono)' }}>{item.time}</span>
      </div>
      <div style={{
        color: C.text, fontSize: featured ? 14 : 13, fontWeight: 600,
        lineHeight: 1.4, marginBottom: featured ? 10 : 6,
      }}>{item.headline}</div>
      {featured && (
        <div style={{ color: C.muted, fontSize: 12, lineHeight: 1.6, marginBottom: 10 }}>
          {item.summary}
        </div>
      )}
      <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
        <div style={{ width: 4, height: 4, borderRadius: '50%', background: C.dim }} />
        <span style={{ color: C.dim, fontSize: 10 }}>{item.source}</span>
      </div>
    </div>
  );
}

function NewsSection() {
  const [featured, ...rest] = NEWS;
  return (
    <div style={{ marginTop: 32 }}>
      <SectionHeader icon="File" label="Intelligence Briefing" />
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
        {/* Featured left */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <NewsCard item={featured} featured />
          <NewsCard item={rest[2]} featured={false} />
        </div>
        {/* Stack right */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {rest.slice(0, 2).map(n => <NewsCard key={n.id} item={n} featured={false} />)}
          {/* Divider with label */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '4px 0' }}>
            <div style={{ flex: 1, height: 1, background: C.border }} />
            <span style={{ color: C.dim, fontSize: 9, letterSpacing: '0.15em', textTransform: 'uppercase' }}>Earlier today</span>
            <div style={{ flex: 1, height: 1, background: C.border }} />
          </div>
          <NewsCard key={rest[3]?.id} item={rest[3]} featured={false} />
        </div>
      </div>
    </div>
  );
}


function App() {
  const [tweaksOn, setTweaksOn] = useState(false);

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOn(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOn(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  return (
    <div style={{ minHeight: '100vh', background: 'transparent' }}>
      <NavBar />
      <div style={{ maxWidth: 1160, margin: '0 auto', padding: '32px 24px 80px' }}>

        {/* Page header */}
        <div style={{ marginBottom: 32, paddingBottom: 24, borderBottom: `1px solid ${C.border}` }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
            <div style={{
              width: 8, height: 8, borderRadius: '50%', background: C.cyan,
              boxShadow: `0 0 10px ${C.cyan}`,
              animation: 'pulse 2s infinite',
            }} />
            <span style={{ color: C.cyan, fontSize: 10, fontWeight: 600, letterSpacing: '0.18em', fontFamily: 'var(--mono)', textTransform: 'uppercase' }}>Live</span>
          </div>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, margin: 0, letterSpacing: '-0.02em' }}>
            Analysis Dashboard Hub
          </h1>
          <p style={{ color: C.muted, fontSize: 13, marginTop: 5 }}>
            Geopolitical &amp; Financial Intelligence Dashboards
          </p>
        </div>

        <NewAnalysisForm />
        <BestPicks />
        <QueueSection />

        {/* Dashboards */}
        <SectionHeader icon="BarChart" label="Dashboards" count={DASHBOARDS.length} />
        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))',
          gap: 12,
        }}>
          {DASHBOARDS.map(d => <DashCard key={d.path} dash={d} />)}
        </div>

        <NewsSection />

        {/* Version */}
        <div style={{ textAlign: 'center', marginTop: 48, color: C.dim, fontSize: 10, fontFamily: 'var(--mono)' }}>
          v2.3.1 — 2026-04-20
        </div>
      </div>

      <TweaksPanel visible={tweaksOn} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
