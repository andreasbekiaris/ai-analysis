<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="48" x2="0" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="48" x2="0" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="48" x2="0" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="line" x1="8" y1="28" x2="56" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" stroke="#1e293b" stroke-width="1.5" fill="none"/>
  <!-- Grid lines -->
  <line x1="8" y1="20" x2="56" y2="20" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="8" y1="30" x2="56" y2="30" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="8" y1="40" x2="56" y2="40" stroke="#1e293b" stroke-width="0.5"/>
  <!-- Bars -->
  <rect x="12" y="28" width="7" height="20" rx="2" fill="url(#bar1)" opacity="0.9"/>
  <rect x="23" y="18" width="7" height="30" rx="2" fill="url(#bar2)" opacity="0.9"/>
  <rect x="34" y="24" width="7" height="24" rx="2" fill="url(#bar3)" opacity="0.9"/>
  <rect x="45" y="14" width="7" height="34" rx="2" fill="url(#bar1)" opacity="0.9"/>
  <!-- Trend line -->
  <polyline points="15.5,26 26.5,16 37.5,22 48.5,12" stroke="url(#line)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <!-- Dots on trend line -->
  <circle cx="15.5" cy="26" r="2.5" fill="#06b6d4"/>
  <circle cx="26.5" cy="16" r="2.5" fill="#8b5cf6"/>
  <circle cx="37.5" cy="22" r="2.5" fill="#f59e0b"/>
  <circle cx="48.5" cy="12" r="2.5" fill="#ef4444"/>
</svg>
